services:
  postgres:
    image: postgres:16
    container_name: djdesk-postgres
    environment:
      POSTGRES_DB: djdesk
      POSTGRES_USER: djdesk
      POSTGRES_PASSWORD: djdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: djdesk-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
